/* ─────────────────────────────────────────────────────────────────────

  --danger:       #E24B4A;
  --gray3:        #888780;

* { box-sizing: border-box; }

  color: var(--black);

/* Wired to Brevo (sibforms.com) for live signup capture with double opt-in from offshore-surf.com */

const { useState, useEffect, useRef } = React;

const BREVO_FORM_ENDPOINT = 'https://bb7a6d1c.sibforms.com/serve/MUIFAG9m_TP2Y8IGBAnPQnSo2NrBSwAa7SfhQe6HtC7EFRn9q70UUzLhLLys1G8NLAZ6fJcrF3ebIKftmXycV_vuqXvW3oWvm0DUUvv4x1tR2reT3268tco1t9qmoawvWL-kaWN_s7r9lv8jCDn7CEvB-NJmxkVhJqZJWuGI_j1zROBfgFR_XZ0x3nVIxSarYCNUci4l4llD0xQxNA==';

// ─── signup handler ────────────────────────────────────────────────────────
async function joinWaitlist(_prev, formData) {
  const email = String(formData.get('email') ?? '').trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    return { status: 'error', message: "Hmm, that doesn't look right." };
  }
  try {
    // Brevo's sibforms endpoint expects multipart/form-data with EMAIL, the
    // honeypot field (`email_address_check`), and `locale`. CORS is not exposed
    // on the public submission endpoint, so we fire-and-forget with no-cors
    // and trust the submission went through if the network request didn't fail.
    const body = new FormData();
    body.append('EMAIL', email);
    body.append('email_address_check', '');
    body.append('locale', 'en');
    await fetch(BREVO_FORM_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      body,
    });
    return { status: 'success', email };
  } catch (err) {
    return { status: 'error', message: "Network hiccup. Try again?" };
  }
}

// useActionState polyfill that matches the React 19 signature we use.
function useActionStateLocal(action, initial) {
  const [state, setState] = useState(initial);
  const [isPending, setIsPending] = useState(false);
  const formAction = async (formData) => {
    setIsPending(true);
    try {
      const next = await action(state, formData);
      setState(next);
    } finally {
      setIsPending(false);
    }
  };
  return [state, formAction, isPending];
}

// ─── components/waitlist-form.tsx ──────────────────────────────────────────
const INITIAL = { status: 'idle' };

function WaitlistForm() {
  const [state, formAction, isPending] = useActionStateLocal(joinWaitlist, INITIAL);
  const [email, setEmail] = useState('');

  const isSuccess = state.status === 'success';
  const isError = state.status === 'error' && !isPending;
  const formClass = isPending ? 'submitting' : isSuccess ? 'success' : isError ? 'error' : 'idle';

  const onSubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(e.currentTarget);
    formAction(fd);
  };

  return (
    <form className={`form ${formClass}`} onSubmit={onSubmit} noValidate>
      <div className="field-row">
        <input
          name="email"
          type="email"
          className="email-input"
          placeholder="you@example.com"
          value={email}
          onChange={(e) => setEmail(e.target.value)}
          disabled={isPending || isSuccess}
          aria-label="Email address"
          autoComplete="email"
          spellCheck={false}
        />
        <button type="submit" className="cta" disabled={isPending || isSuccess}>
          <span className="cta-label">
            {isSuccess ? "You're in" : isPending ? 'Joining…' : 'Join the lineup'}
          </span>
          <span className="cta-arrow" aria-hidden="true">
            {isSuccess ? '✓' : '→'}
          </span>
        </button>
      </div>
      <div className="form-meta">
        {isError ? (
          <span className="error-msg">{state.message}</span>
        ) : isSuccess ? (
          <span className="success-msg">You're in. We'll email you when the beta opens.</span>
        ) : (
          <span>Unsubscribe anytime · No spam, ever</span>
        )}
      </div>
    </form>
  );
}

// ─── components/landing-animations.tsx ─────────────────────────────────────
function LandingAnimations() {
  useEffect(() => {
    if (typeof window === 'undefined' || !window.gsap) return;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    const gsap = window.gsap;
    const ctx = gsap.context(() => {
      gsap.from('.headline-word', {
        yPercent: 60,
        autoAlpha: 0,
        duration: 0.7,
        stagger: 0.06,
        ease: 'power3.out',
        delay: 0.05,
      });

      gsap.from(['.subhead', '.join-column'], {
        y: 12,
        autoAlpha: 0,
        duration: 0.6,
        stagger: 0.1,
        ease: 'power2.out',
        delay: 0.55,
      });

      gsap.from(
        ['.join-stamp', '.join-pitch', '.join-column .form', '.join-perks li', '.join-sign'],
        {
          y: 8,
          autoAlpha: 0,
          duration: 0.5,
          stagger: 0.06,
          ease: 'power2.out',
          delay: 0.75,
        }
      );

      if (window.ScrollTrigger) {
        gsap.from('.pillar', {
          y: 18,
          autoAlpha: 0,
          duration: 0.65,
          stagger: 0.1,
          ease: 'power2.out',
          scrollTrigger: {
            trigger: '.pillars',
            start: 'top 85%',
            toggleActions: 'play none none none',
          },
        });
      }
    });
    return () => ctx.revert();
  }, []);
  return null;
}
