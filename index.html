/* ─────────────────────────────────────────────────────────────────────
   Offshore — waitlist landing
   Light mode · matches app aesthetic · cream + ocean

:root {

  --danger:       #E24B4A;
  --gray3:        #888780;

  --line:         rgba(8, 8, 8, 0.10);
  --line-strong:  rgba(8, 8, 8, 0.18);

  --font-display: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-ui:      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-mono:    ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --gutter: 24px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-ui);
  background: var(--cream);
  color: var(--black);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
}

::selection {
  background: var(--ocean);
  color: #FFFFFF;
}

/* ─────────────────────────────────────────────────────────────────────

   ───────────────────────────────────────────────────────────────────── */

/* Issue banner — full-bleed editorial strip at the top */

    <script type="text/babel" data-presets="env,react">
/* Wired to the real Brevo subscription form endpoint (sibforms.com).
   Your custom form posts the email invisibly to Brevo with the exact fields
   Brevo expects (EMAIL, the email_address_check honeypot, and locale). Brevo
   then sends the confirmation/welcome email and adds the contact. */

const { useState, useEffect, useRef } = React;

const BREVO_FORM_ENDPOINT = 'https://bb7a6d1c.sibforms.com/serve/MUIFAIUkIQpBKBd7sXm0Nkp6j5ILF6Bd1JsVV0HhgQF4TS_ZTKdp1Ri37gjb9Bdwm-tSvrfZ2LQHjkhuZHbqUcw21d1wQoWK10uaJvcbH_7NMk2deRJDpU58tyQh7H0gT-Q-drtfZxc2uQzGmQiXdV2MwOjV39J9DXSoHMIutaBjFE5ml22ofSieLStrqXsr5t2XNyjb-b0QGT9dOw==';

// ─── signup handler ────────────────────────────────────────────────────────
async function joinWaitlist(_prev, formData) {
  const email = String(formData.get('email') ?? '').trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    return { status: 'error', messageKey: 'invalid' };
  }
  try {
    // Brevo's serve endpoint expects multipart/form-data with EMAIL, the
    // honeypot field (email_address_check, left empty), and locale. The
    // endpoint doesn't expose CORS headers, so we fire with no-cors — we can't
    // read the response, but the submission is recorded by Brevo.
    const body = new FormData();
    body.append('EMAIL', email);
    body.append('email_address_check', '');
    body.append('locale', String(formData.get('locale') || 'en'));
    await fetch(BREVO_FORM_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      body,
    });
    return { status: 'success', email };
  } catch (err) {
    return { status: 'error', messageKey: 'network' };
  }
}

// ─── i18n ────────────────────────────────────────────────────────────

const LangContext = React.createContext(null);
const useT = () => React.useContext(LangContext);

// useActionState polyfill that matches the React 19 signature we use.
function useActionStateLocal(action, initial) {
  const [state, setState] = useState(initial);
  const [isPending, setIsPending] = useState(false);
  const formAction = async (formData) => {
    setIsPending(true);
    try {
      const next = await action(state, formData);
      setState(next);
    } finally {
      setIsPending(false);
    }
  };
  return [state, formAction, isPending];
}

const INITIAL = { status: 'idle' };

function WaitlistForm() {
  const { t, lang } = useT();
  const [state, formAction, isPending] = useActionStateLocal(joinWaitlist, INITIAL);
  const [email, setEmail] = useState('');

  const isSuccess = state.status === 'success';
  const isError = state.status === 'error' && !isPending;
  const formClass = isPending ? 'submitting' : isSuccess ? 'success' : isError ? 'error' : 'idle';

  const onSubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(e.currentTarget);
    fd.append('locale', lang);
    formAction(fd);
  };

  return (
    <form className={`form ${formClass}`} onSubmit={onSubmit} noValidate>
      <div className="field-row">
        <input
          name="email"
          type="email"
          className="email-input"
          placeholder={t.form.placeholder}
          value={email}
          onChange={(e) => setEmail(e.target.value)}
          disabled={isPending || isSuccess}
          aria-label={t.form.aria}
          autoComplete="email"
          spellCheck={false}
        />
        <button type="submit" className="cta" disabled={isPending || isSuccess}>
          <span className="cta-label">
            {isSuccess ? t.form.success : isPending ? t.form.pending : t.form.idle}
          </span>
          <span className="cta-arrow" aria-hidden="true">
            {isSuccess ? '✓' : '→'}
          </span>
        </button>
      </div>
      <div className="form-meta">
        {isError ? (
          <span className="error-msg">{t.form.errors[state.messageKey] || t.form.errors.network}</span>
        ) : isSuccess ? (
          <span className="success-msg">{t.form.successMsg}</span>
        ) : (
          <span>{t.form.metaIdle}</span>
        )}
      </div>
    </form>
  );
}

// ─── components/landing-animations.tsx ─────────────────────────────────────
function LandingAnimations() {
  useEffect(() => {
    if (typeof window === 'undefined' || !window.gsap) return;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    const gsap = window.gsap;
    const ctx = gsap.context(() => {
      gsap.from('.headline-word', {
        yPercent: 60,
        autoAlpha: 0,
        duration: 0.7,
        stagger: 0.06,
        ease: 'power3.out',
        delay: 0.05,
      });

      gsap.from(['.subhead', '.join-column'], {
        y: 12,
        autoAlpha: 0,
        duration: 0.6,
        stagger: 0.1,
        ease: 'power2.out',
        delay: 0.55,
      });

      gsap.from(
        ['.join-stamp', '.join-pitch', '.join-column .form', '.join-perks li', '.join-sign'],
        {
          y: 8,
          autoAlpha: 0,
          duration: 0.5,
          stagger: 0.06,
          ease: 'power2.out',
          delay: 0.75,
        }
      );

      if (window.ScrollTrigger) {
        gsap.from('.pillar', {
          y: 18,
          autoAlpha: 0,
          duration: 0.65,
          stagger: 0.1,
          ease: 'power2.out',
          scrollTrigger: {
            trigger: '.pillars',
            start: 'top 85%',
            toggleActions: 'play none none none',
          },
        });
      }
    });
    return () => ctx.revert();
  }, []);
  return null;
}

function LangToggle() {

  return (
    <div className="lang-toggle" role="group" aria-label="Language / Idioma">
      <button
        type="button"
        className={lang === 'en' ? 'active' : ''}
        onClick={() => setLang('en')}
        aria-pressed={lang === 'en'}
      >
        EN
      </button>
      <span className="sep" aria-hidden="true">/</span>
      <button
        type="button"
        className={lang === 'es' ? 'active' : ''}
        onClick={() => setLang('es')}
        aria-pressed={lang === 'es'}
      >
        ES
      </button>
    </div>
  );
}
